<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#081321;color:#eef5ff;font-family:Segoe UI,Arial,sans-serif}
    .card{max-width:520px;margin:20px;padding:32px;border-radius:24px;background:#101d34;border:1px solid rgba(255,255,255,.08);text-align:center}
    h1{font-size:40px;margin:0 0 12px}.pill{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,179,71,.16);color:#ffd39a;font-weight:700}
    p{color:#a6bbd8;line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div class="pill">Modo offline</div>
    <h1>Sigues dentro de la app</h1>
    <p>No hay conexión, pero la interfaz principal y los recursos ya cacheados siguen disponibles.</p>
  </div>
</body>
</html>
