<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open-Meteo · Proyecto final</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero"><div><p class="eyebrow">API 6 · Open-Meteo</p><h1>Proyecto final: geocodificación + tiempo</h1><p>Un ejemplo realista con dos peticiones encadenadas: primero localización y después meteorología.</p></div></header>
  <main class="grid">
    <section class="card controls">
      <h2>Consulta del tiempo</h2>
      <div class="search-row">
        <input id="city" placeholder="Madrid, Zaragoza, Valencia…" value="Madrid" />
        <button id="weather">Consultar</button>
      </div>
      <pre id="status" class="status">Introduce una ciudad para empezar.</pre>
    </section>
    <section class="card"><h2>Pronóstico</h2><div id="forecast" class="forecast"></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
